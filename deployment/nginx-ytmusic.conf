# Nginx reverse proxy configuration for YouTube Music API Service
# Place this file in /etc/nginx/sites-available/ytmusic
# Then: ln -s /etc/nginx/sites-available/ytmusic /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;  # CHANGE THIS to your domain or Droplet IP

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }
}
