name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ytmusic-service/requirements.txt

      - name: Install dependencies
        run: |
          cd ytmusic-service
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          cd ytmusic-service
          pytest tests/test_app.py -v --tb=short

  test-lambda:
    name: Lambda Handler Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Lambda tests
        run: node lambda/test/test_handlers.js

  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python code
        run: |
          cd ytmusic-service
          flake8 app.py --max-line-length=120 --ignore=E501,W503

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test-python]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd ytmusic-service
          docker build -t ytmusic-service:test .

      - name: Test Docker container starts
        run: |
          docker run -d --name ytmusic-test -p 8080:8080 ytmusic-service:test
          sleep 5
          curl -f http://localhost:8080/health || (docker logs ytmusic-test && exit 1)
          docker stop ytmusic-test
          docker rm ytmusic-test
