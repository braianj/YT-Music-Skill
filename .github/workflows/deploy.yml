name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - 'ytmusic-service/**'
      - 'deployment/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy Python Service
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/ytmusic-service

            # Pull latest code
            git pull origin main 2>/dev/null || true

            # Update files from repo
            # (Assumes the repo is cloned on the Droplet)

            # Update dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Update yt-dlp to latest version
            pip install --upgrade yt-dlp --quiet

            # Restart the service
            sudo systemctl restart ytmusic

            # Wait and verify
            sleep 3
            curl -sf http://localhost:8080/health || echo "WARNING: Health check failed"

  deploy-lambda:
    name: Deploy Alexa Lambda
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [deploy]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install ASK CLI
        run: npm install -g ask-cli

      - name: Configure ASK CLI
        env:
          ASK_REFRESH_TOKEN: ${{ secrets.ASK_REFRESH_TOKEN }}
          ASK_VENDOR_ID: ${{ secrets.ASK_VENDOR_ID }}
          ASK_ACCESS_TOKEN: ${{ secrets.ASK_ACCESS_TOKEN }}
        run: |
          mkdir -p ~/.ask
          cat > ~/.ask/cli_config << EOF
          {
            "profiles": {
              "default": {
                "token": {
                  "access_token": "$ASK_ACCESS_TOKEN",
                  "refresh_token": "$ASK_REFRESH_TOKEN",
                  "token_type": "bearer"
                },
                "vendor_id": "$ASK_VENDOR_ID"
              }
            }
          }
          EOF

      - name: Deploy Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          ask deploy --target lambda
